---
name: Roq Site Deploy

env:
  TZ: America/Sao_Paulo
on:
  push:
    branches: [main]
    paths-ignore:
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
      - '.all-contributorsrc'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == 'quarkusclub/quarkusclub.github.io'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Roq Site
        uses: quarkiverse/quarkus-roq@v1
        with:
          java-version: 21
          github-token: ${{secrets.GITHUB_TOKEN}}   # Used to automatically get the GitHub Pages url
        env:
          QUARKUS_ROQ_GENERATOR_BATCH: true
  deploy:
    if: github.repository == 'quarkusclub/quarkusclub.github.io'
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4